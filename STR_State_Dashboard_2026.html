:root{--bg:#f0f2f5;--card:#fff;--header:#1b2a4a;--accent:#e85d26;--accent2:#2563eb;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--green:#16a34a;--red:#dc2626;--r:10px;--g:14px;}

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
.hdr{background:var(--header);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.logo{font-size:22px;font-weight:800;}.logo span{color:var(--accent);}
.sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px;}
.hdr-r{font-size:12px;color:rgba(255,255,255,0.5);}
.tw{background:var(--header);border-top:1px solid rgba(255,255,255,0.1);padding:0 24px;overflow-x:auto;}
.tabs{display:flex;white-space:nowrap;}
.tab{padding:10px 16px;cursor:pointer;font-size:12px;font-weight:600;color:rgba(255,255,255,0.55);border-bottom:3px solid transparent;letter-spacing:0.3px;text-transform:uppercase;}
.tab:hover{color:rgba(255,255,255,0.9);}
.tab.active{color:#fff;border-bottom-color:var(--accent);}
.main{max-width:1400px;margin:0 auto;padding:var(--g);}
.kr{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--g);margin-bottom:var(--g);}
@media(max-width:900px){.kr{grid-template-columns:repeat(2,1fr);}}
.kc{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid transparent;}
.kc.rv{border-left-color:#4C72B0;}.kc.oc{border-left-color:#55A868;}.kc.ad{border-left-color:#DD8452;}.kc.pr{border-left-color:#8172B3;}
.kl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.kv{font-size:28px;font-weight:700;color:var(--text);line-height:1;}
.ks{font-size:12px;color:var(--muted);margin-top:5px;}
.kg{font-size:12px;font-weight:600;margin-top:4px;}
.pos{color:var(--green);}.neg{color:var(--red);}
.ctl{display:flex;align-items:center;gap:8px;margin-bottom:var(--g);flex-wrap:wrap;}
.ctl-lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.sb{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.sb.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.sd{padding:6px 10px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;cursor:pointer;color:var(--muted);}
.sx{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;outline:none;width:200px;}
.sx:focus{border-color:var(--accent2);}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:var(--g);margin-bottom:var(--g);}
@media(max-width:800px){.cr{grid-template-columns:1fr;}}
.cc{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.ct{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;}
.cc canvas{max-height:260px;}
.tc{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow-x:auto;margin-bottom:var(--g);}
.th{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.tt{font-size:13px;font-weight:700;color:var(--text);}
.tn{font-size:12px;color:var(--muted);}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{padding:9px 12px;text-align:left;background:#f8fafc;border-bottom:2px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
tbody td{padding:9px 12px;border-bottom:1px solid #f1f5f9;white-space:nowrap;}
tbody tr:hover{background:#f8fafc;}
tbody tr:last-child td{border-bottom:none;}
.rb{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-weight:700;font-size:12px;}
.rg{background:#fef3c7;color:#92400e;}.rt{background:#dcfce7;color:#15803d;}.rm{background:#f1f5f9;color:#475569;}.rr{background:#fee2e2;color:#b91c1c;}
.ig{color:var(--green);font-weight:600;}.ib{color:var(--red);font-weight:600;}.in{color:var(--muted);}
.pc{font-size:11px;}
.ppc{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nd{text-align:center;padding:30px;color:var(--muted);}
.lr{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;font-size:11px;color:var(--muted);align-items:center;}
.ld{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle;}
footer{text-align:center;font-size:11px;color:var(--muted);padding:16px;}
</style>
</head>

USSETTS", "str_id": "", "revpar": null, "revpar_pct_chg": null, "revpar_index": null, "comp_revpar": null, "revpar_rank": null, "revpar_rank_total": null, "occ": null, "occ_pct_chg": null, "occ_index": null, "comp_occ": null, "occ_rank": null, "occ_rank_total": null, "adr": null, "adr_pct_chg": null, "adr_index": null, "comp_adr": null, "adr_rank": null, "adr_rank_total": null, "comp_set_sample": null}]};
var ST=Object.keys(D);
var ci=0,sf='revpar_rank',sd='asc',sq='';
var ch={};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function f$(v){return v===null?'--':'$'+v.toFixed(2);}
function fp(v){return v===null?'--':(v>=0?'+':'')+v.toFixed(1)+'%';}
function fo(v){return v===null?'--':v.toFixed(1)+'%';}
function fi(v){return v===null?'--':v.toFixed(1);}
function ic(v){return v===null?'in':v>=100?'ig':'ib';}
function av(a,k){var x=a.filter(function(h){return h[k]!==null;});return x.length?x.reduce(function(s,h){return s+h[k];},0)/x.length:0;}
function rb(r,t){
  if(r===null||t===null)return '<span class="in">--</span>';
  var p=r/t,c=r===1?'rg':p<=0.34?'rt':p<=0.67?'rm':'rr';
  return '<span class="rb '+c+'">'+r+'</span><span style="color:var(--muted);font-size:11px"> /'+t+'</span>';
}
function gv(h,f){
  if(f==='property')return h.property.toLowerCase();
  var v=h[f];return v===null?(f.indexOf('rank')>=0?9999:-9999):v;
}
function srt(arr){
  return arr.slice().sort(function(a,b){
    var av=gv(a,sf),bv=gv(b,sf),c=av<bv?-1:av>bv?1:0;
    return sd==='asc'?c:-c;
  });
}

function buildTabs(){
  var h='';
  for(var i=0;i<ST.length;i++){
    h+='<div class="tab'+(i===ci?' active':'')+'" data-i="'+i+'">'+esc(ST[i])+'</div>';
  }
  document.getElementById('tabs').innerHTML=h;
  var els=document.getElementById('tabs').querySelectorAll('.tab');
  for(var j=0;j<els.length;j++){
    (function(idx){els[idx].addEventListener('click',function(){ci=idx;buildTabs();renderState();});})(j);
  }
}

function buildChartR(hotels){
  var top=hotels.filter(function(h){return h.revpar!==null;}).sort(function(a,b){return b.revpar-a.revpar;}).slice(0,15);
  var labels=top.map(function(h){return h.property.replace(/Motel 6\s*[–\-]\s*/,'').replace(/Studio 6\s*/,'S6 ').substring(0,28);});
  if(ch.r){ch.r.destroy();}
  ch.r=new Chart(document.getElementById('chartR').getContext('2d'),{type:'bar',
    data:{labels:labels,datasets:[
      {label:'My RevPAR',data:top.map(function(h){return h.revpar;}),backgroundColor:'rgba(76,114,176,0.8)',borderRadius:4},
      {label:'Comp Set',data:top.map(function(h){return h.comp_revpar;}),backgroundColor:'rgba(221,132,82,0.8)',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{usePointStyle:true,boxWidth:8,padding:12,font:{size:11}}},
        tooltip:{callbacks:{label:function(c){return c.dataset.label+': $'+c.parsed.y.toFixed(2);}}}},
      scales:{x:{ticks:{maxRotation:45,font:{size:10}},grid:{display:false}},
              y:{beginAtZero:true,ticks:{callback:function(v){return '$'+v.toFixed(0);}}}}}});
}

function buildChartI(hotels){
  var cats=['<70','70-80','80-90','90-100','100-110','110-120','120-130','>130'],bins=[0,0,0,0,0,0,0,0];
  hotels.forEach(function(h){
    var v=h.revpar_index;if(v===null)return;
    if(v<70)bins[0]++;else if(v<80)bins[1]++;else if(v<90)bins[2]++;else if(v<100)bins[3]++;
    else if(v<110)bins[4]++;else if(v<120)bins[5]++;else if(v<130)bins[6]++;else bins[7]++;
  });
  if(ch.i){ch.i.destroy();}
  ch.i=new Chart(document.getElementById('chartI').getContext('2d'),{type:'bar',
    data:{labels:cats,datasets:[{label:'Hotels',data:bins,borderRadius:4,
      backgroundColor:['rgba(220,38,38,0.75)','rgba(220,38,38,0.75)','rgba(220,38,38,0.75)','rgba(220,38,38,0.75)',
                        'rgba(22,163,74,0.75)','rgba(22,163,74,0.75)','rgba(22,163,74,0.75)','rgba(22,163,74,0.75)']}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y+' hotel'+(c.parsed.y!==1?'s':'');}}}},
      scales:{x:{grid:{display:false},title:{display:true,text:'RevPAR Index',font:{size:11}}},
              y:{beginAtZero:true,ticks:{stepSize:1},title:{display:true,text:'# Hotels',font:{size:11}}}}}});
}

function renderState(){
  var state=ST[ci],hotels=D[state]||[];
  var rC=av(hotels,'revpar_pct_chg'),oC=av(hotels,'occ_pct_chg'),aC=av(hotels,'adr_pct_chg');
  var filt=srt(hotels).filter(function(h){return !sq||h.property.toLowerCase().indexOf(sq.toLowerCase())>=0;});

  var sdefs=[
    {f:'revpar_rank',l:'RevPAR Rank'},{f:'occ_rank',l:'Occ Rank'},{f:'adr_rank',l:'ADR Rank'},
    {f:'revpar',l:'RevPAR $'},{f:'revpar_index',l:'Index'},{f:'revpar_pct_chg',l:'% Change'},{f:'property',l:'Name A-Z'}
  ];
  var btns='';
  for(var si=0;si<sdefs.length;si++){
    var b=sdefs[si];
    btns+='<button class="sb'+(sf===b.f?' active':'')+'" data-f="'+b.f+'">'+b.l+'</button>';
  }

  var rows='';
  for(var ri=0;ri<filt.length;ri++){
    var h=filt[ri],n=ri+1,tot=filt.length,p=n/tot;
    var nb=n===1?'rg':p<=0.34?'rt':p<=0.67?'rm':'rr';
    var rc=h.revpar_pct_chg===null?'':h.revpar_pct_chg>=0?'pos':'neg';
    var oc=h.occ_pct_chg===null?'':h.occ_pct_chg>=0?'pos':'neg';
    var ac=h.adr_pct_chg===null?'':h.adr_pct_chg>=0?'pos':'neg';
    rows+='<tr>'+
      '<td><span class="rb '+nb+'">'+n+'</span></td>'+
      '<td class="ppc" title="'+esc(h.property)+'">'+esc(h.property)+'</td>'+
      '<td>'+f$(h.revpar)+'<br><span class="pc '+rc+'">'+fp(h.revpar_pct_chg)+'</span></td>'+
      '<td>'+rb(h.revpar_rank,h.revpar_rank_total)+'</td>'+
      '<td><span class="'+ic(h.revpar_index)+'">'+fi(h.revpar_index)+'</span></td>'+
      '<td>'+f$(h.comp_revpar)+'</td>'+
      '<td>'+fo(h.occ)+'<br><span class="pc '+oc+'">'+fp(h.occ_pct_chg)+'</span></td>'+
      '<td>'+rb(h.occ_rank,h.occ_rank_total)+'</td>'+
      '<td><span class="'+ic(h.occ_index)+'">'+fi(h.occ_index)+'</span></td>'+
      '<td>'+f$(h.adr)+'<br><span class="pc '+ac+'">'+fp(h.adr_pct_chg)+'</span></td>'+
      '<td>'+rb(h.adr_rank,h.adr_rank_total)+'</td>'+
      '<td><span class="'+ic(h.adr_index)+'">'+fi(h.adr_index)+'</span></td>'+
      '</tr>';
  }

  document.getElementById('main').innerHTML=
    '<div class="kr">'+
      '<div class="kc pr"><div class="kl">Properties</div><div class="kv">'+hotels.length+'</div><div class="ks">'+esc(state)+'</div></div>'+
      '<div class="kc rv"><div class="kl">Avg RevPAR</div><div class="kv">'+f$(av(hotels,'revpar'))+'</div><div class="kg '+(rC>=0?'pos':'neg')+'">'+fp(rC)+' vs prior</div></div>'+
      '<div class="kc oc"><div class="kl">Avg Occupancy</div><div class="kv">'+fo(av(hotels,'occ'))+'</div><div class="kg '+(oC>=0?'pos':'neg')+'">'+fp(oC)+' vs prior</div></div>'+
      '<div class="kc ad"><div class="kl">Avg ADR</div><div class="kv">'+f$(av(hotels,'adr'))+'</div><div class="kg '+(aC>=0?'pos':'neg')+'">'+fp(aC)+' vs prior</div></div>'+
    '</div>'+
    '<div class="cr">'+
      '<div class="cc"><div class="ct">Top 15 Hotels by RevPAR vs. Comp Set</div><canvas id="chartR"></canvas></div>'+
      '<div class="cc"><div class="ct">RevPAR Index Distribution</div>'+
        '<div class="lr"><span><span class="ld" style="background:#dc2626"></span>Below 100</span><span><span class="ld" style="background:#16a34a"></span>100+ (over-indexing)</span></div>'+
        '<canvas id="chartI"></canvas></div>'+
    '</div>'+
    '<div class="ctl"><span class="ctl-lbl">Sort:</span>'+btns+
      '<button class="sd" id="dirBtn">'+(sd==='asc'?'&#9650; Asc':'&#9660; Desc')+'</button>'+
      '<input class="sx" id="searchBox" type="text" placeholder="Search hotel..." value="'+esc(sq)+'">'+
    '</div>'+
    '<div class="tc">'+
      '<div class="th"><div class="tt">'+esc(state)+' &mdash; Hotel Rankings</div>'+
        '<div class="tn">'+filt.length+' of '+hotels.length+' properties</div></div>'+
      '<table><thead><tr>'+
        '<th>#</th><th>Property</th><th>RevPAR&nbsp;/&nbsp;Chg</th><th>RevPAR Rank</th><th>RevPAR Idx</th><th>Comp RevPAR</th>'+
        '<th>Occ&nbsp;/&nbsp;Chg</th><th>Occ Rank</th><th>Occ Idx</th>'+
        '<th>ADR&nbsp;/&nbsp;Chg</th><th>ADR Rank</th><th>ADR Idx</th>'+
      '</tr></thead><tbody>'+(rows||'<tr><td colspan="12" class="nd">No properties found.</td></tr>')+'</tbody></table>'+
    '</div>';

  // Attach sort button listeners
  var sbtns=document.querySelectorAll('.sb');
  for(var bi=0;bi<sbtns.length;bi++){
    (function(btn){btn.addEventListener('click',function(){
      var f=btn.getAttribute('data-f');
      sf===f?(sd=sd==='asc'?'desc':'asc'):(sf=f,sd=f.indexOf('rank')>=0?'asc':'desc');
      renderState();
    });})(sbtns[bi]);
  }
  document.getElementById('dirBtn').addEventListener('click',function(){sd=sd==='asc'?'desc':'asc';renderState();});
  document.getElementById('searchBox').addEventListener('input',function(){sq=this.value;renderState();});

  buildChartR(hotels);
  buildChartI(hotels);
}

buildTabs();
renderState();
</script>
